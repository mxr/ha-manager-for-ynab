[tool.coverage.run]
plugins = ["covdefaults"]

[tool.mypy]
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "testing.*"

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "tests.*"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
extend-select = [
  "UP",  # see pyupgrade
  "B",  # see flake8-bugbear
  "A",  # see flake8-builtins
  "C4",  # see flake8-comprehension
  "SIM",  # see flake8-simplify
  "TC",  # see flake8-type-checking
  "I",  # sort imports (not using reorder-python-imports due to https://github.com/asottile/reorder-python-imports/issues/366)
]

# not using reorder-python-imports due to https://github.com/asottile/reorder-python-imports/issues/366
[tool.ruff.lint.isort]
force-single-line = true
required-imports = ["from __future__ import annotations"]

[tool.sqlfluff.layout.type.comma]
line_position = "leading"
spacing_before = "touch"

[tool.sqlfluff.layout.type.from_clause]
keyword_line_position = "leading"

[tool.sqlfluff.layout.type.when_clause]
keyword_line_position = "leading"

[tool.sqlfluff.rules.capitalisation.functions]
extended_capitalisation_policy = 'upper'

[tool.sqlfluff.rules.capitalisation.identifiers]
extended_capitalisation_policy = 'lower'

[tool.sqlfluff.rules.capitalisation.keywords]
capitalisation_policy = 'upper'

[tool.sqlfluff.rules.capitalisation.literals]
capitalisation_policy = 'upper'

[tool.sqlfluff.rules.convention.not_equal]
preferred_not_equal_style = "c_style"

[tool.sqlfluff.rules.convention.terminator]
multiline_newline = true
require_final_semicolon = true

[tool.sqlfluff.rules.references.quoting]
prefer_quoted_keywords = true

[tool.tox]
env_list = ["py314", "pre-commit"]

[tool.tox.env.pre-commit]
commands = [["pre-commit", "run", "--all-files", "--show-diff-on-failure"]]
deps = "pre-commit"
skip_install = true

[tool.tox.env_run_base]
commands = [
  ["coverage", "erase"],
  ["coverage", "run", "-m", "pytest", "{posargs:tests}"],
  ["coverage", "report"],
]
commands_pre = [
  [
    "python",
    "-c",
    '''
import json
import pathlib
import subprocess
import sys

manifest = json.loads(pathlib.Path("custom_components/ha_manager_for_ynab/manifest.json").read_text())
subprocess.check_call([sys.executable, "-m", "pip", "install", *manifest["requirements"]])
''',
  ],
]
deps = [
  "covdefaults",
  "coverage",
  "homeassistant",
  "pytest<9",
  "pytest-asyncio",
  "pytest-homeassistant-custom-component",
]
