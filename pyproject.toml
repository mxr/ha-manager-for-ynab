[tool.mypy]
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "testing.*"

[[tool.mypy.overrides]]
disallow_untyped_defs = false
module = "tests.*"

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
extend-select = [
  "UP",  # see pyupgrade
  "B",  # see flake8-bugbear
  "A",  # see flake8-builtins
  "C4",  # see flake8-comprehension
  "SIM",  # see flake8-simplify
  "TC",  # see flake8-type-checking
  "I",  # sort imports (not useing reorder-python-imports due to https://github.com/asottile/reorder-python-imports/issues/366)
]

[tool.tox]
env_list = ["py314", "pre-commit"]

[tool.tox.env.pre-commit]
commands = [["pre-commit", "run", "--all-files", "--show-diff-on-failure"]]
deps = "pre-commit"
skip_install = true

[tool.tox.env_run_base]
commands = [
  ["coverage", "erase"],
  ["coverage", "run", "-m", "pytest", "{posargs:tests}"],
  ["coverage", "report"],
]
commands_pre = [
  [
    "python",
    "-c",
    '''
import json
import pathlib
import subprocess
import sys

manifest = json.loads(pathlib.Path("custom_components/ha_manager_for_ynab/manifest.json").read_text())
subprocess.check_call([sys.executable, "-m", "pip", "install", *manifest["requirements"]])
''',
  ],
]
deps = "-rrequirements-dev.txt"
