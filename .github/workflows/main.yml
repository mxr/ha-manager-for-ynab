name: main

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      project_files: ${{ steps.filter.outputs.project_files }}
      typing_linting_files: ${{ steps.filter.outputs.typing_linting_files }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
      id: filter
      with:
        filters: |
          typing_linting_files:
            - '**/*.py'
            - .pre-commit-config.yaml
          project_files:
            - .github/workflows/main.yml
            - '**/*.py'
            - '**/*.toml'
            - '**/*requirements*.txt'
            - '**/setup.cfg'
            - custom_components/*/manifest.json
            - tox.ini
  pre-commit-typing-real:
    needs: [changes]
    if: needs.changes.outputs.typing_linting_files == 'true'
    uses: mxr/workflows/.github/workflows/pre-commit-typing.yml@4f57658477fc69ee1912c6f1d9f43c807bee852a # v0.1.3
  pre-commit-typing:
    needs: [changes, pre-commit-typing-real]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - env:
        TYPING_LINTING_FILES: ${{ needs.changes.outputs.typing_linting_files }}
        PRE_COMMIT_TYPING_REAL_RESULT: ${{ needs.pre-commit-typing-real.result }}
      run: |
        if [ "$TYPING_LINTING_FILES" != "true" ]; then
          exit 0
        fi
        if [ "$PRE_COMMIT_TYPING_REAL_RESULT" != "success" ]; then
          exit 1
        fi
  main-real:
    needs: [changes]
    if: needs.changes.outputs.project_files == 'true'
    uses: asottile/workflows/.github/workflows/tox.yml@adfec6a1ccb5d6b189aa153676d4f0743afa21c1 # v1.11.0
    with:
      env: '["py314"]'
  main:
    needs: [changes, main-real]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - env:
        PROJECT_FILES: ${{ needs.changes.outputs.project_files }}
        MAIN_REAL_RESULT: ${{ needs.main-real.result }}
      run: |
        if [ "$PROJECT_FILES" != "true" ]; then
          exit 0
        fi
        if [ "$MAIN_REAL_RESULT" != "success" ]; then
          exit 1
        fi
