pending_income:
  fields:
    for_real:
      required: true
      example: false
      default: false
      selector:
        boolean:
    sync:
      required: true
      example: true
      default: true
      selector:
        boolean:
    quiet:
      required: true
      example: false
      default: false
      selector:
        boolean:

auto_approve:
  fields:
    for_real:
      required: true
      example: false
      default: false
      selector:
        boolean:
    sync:
      required: true
      example: true
      default: true
      selector:
        boolean:
    quiet:
      required: true
      example: false
      default: false
      selector:
        boolean:

sqlite_export:
  fields:
    full_refresh:
      required: true
      example: false
      default: false
      selector:
        boolean:
    quiet:
      required: true
      example: false
      default: false
      selector:
        boolean:

sqlite_query:
  fields:
    sync:
      required: true
      example: true
      default: true
      selector:
        boolean:
    sql:
      required: true
      example: SELECT * FROM budgets LIMIT 10
      selector:
        text:
          multiline: true

add_transaction:
  fields:
    plan_name:
      required: false
      example: Family Budget
      selector:
        text:
    account_name:
      required: true
      example: Checking
      selector:
        text:
    payee_name:
      required: true
      example: Grocery Store
      selector:
        text:
    category_name:
      required: false
      example: Groceries - Groceries
      selector:
        text:
    date:
      required: true
      example: '2026-05-01'
      selector:
        date:
    cleared:
      required: true
      default: uncleared
      example: uncleared
      selector:
        select:
          options:
          - uncleared
          - cleared
          - reconciled
    amount:
      required: true
      example: 12.34
      selector:
        number:
          mode: box
          step: 0.01
    sync:
      required: true
      example: true
      default: true
      selector:
        boolean:
    quiet:
      required: true
      example: false
      default: false
      selector:
        boolean:
