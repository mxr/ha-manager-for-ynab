default_language_version:
  python: python3.14
ci:
  skip: [mypy]  # venv is too big; runs with gihub action instead

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: pretty-format-json
    args: [--autofix]
  - id: requirements-txt-fixer
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/asottile/setup-cfg-fmt
  rev: 9339507e9522e953c07479c9f6abeec0f2fe4e12  # frozen: v3.2.0
  hooks:
  - id: setup-cfg-fmt
    args: [--min-py-version, '3.14']
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 6fec9b7edb08fd9989088709d864a7826dc74e80  # frozen: v0.15.12
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/sqlfluff/sqlfluff
  rev: ec5ed61d83ae336c65c4c15396a23772ce9d2fcc  # frozen: 4.1.0
  hooks:
  - id: sqlfluff-fix
    args: [--dialect, sqlite]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: a9d9ff50af0432cbb950856daf08082fa51cbfa2  # frozen: v2.0.0
  hooks:
  - id: mypy
    additional_dependencies:
    - aiosqlite>=0.21.0
    - asyncio-for-ynab>=1.83.0
    - homeassistant-stubs
    - manager-for-ynab>=1.6.5
    - pytest-homeassistant-custom-component
    - sqlite-export-for-ynab>=2.7.1
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: a4727cbbcd26d7098e96b9cb738169b59711ae51  # frozen: v1.24.1
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
