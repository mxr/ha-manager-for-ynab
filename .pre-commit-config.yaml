default_language_version:
  python: python3.14
ci:
  skip: [mypy]  # venv is too big; runs with gihub action instead

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: pretty-format-json
    args: [--autofix]
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/asottile/setup-cfg-fmt
  rev: 9339507e9522e953c07479c9f6abeec0f2fe4e12  # frozen: v3.2.0
  hooks:
  - id: setup-cfg-fmt
    args: [--min-py-version, '3.14']
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 3b3f7c3f57fe9925356faf5fe6230835138be230  # frozen: v0.15.17
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/sqlfluff/sqlfluff
  rev: 1c2ec52808fdc09efa1552437ec9d140749f98d0  # frozen: 4.2.2
  hooks:
  - id: sqlfluff-fix
    args: [--dialect, sqlite]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: d2823d321df3af8f878f7ee3414dc94d037145b9  # frozen: v2.1.0
  hooks:
  - id: mypy
    additional_dependencies:
    - aiosqlite~=0.21.0
    - asyncio-for-ynab~=1.84.0
    - homeassistant-stubs
    - manager-for-ynab~=1.8.5
    - pytest-homeassistant-custom-component
    - sqlite-export-for-ynab~=2.9.0
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
