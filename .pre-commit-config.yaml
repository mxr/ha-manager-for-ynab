default_language_version:
  python: python3.14
ci:
  skip: [mypy, ty]  # venv is too big; runs with gihub action instead

repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-docstring-first
  - id: debug-statements
  - id: end-of-file-fixer
  - id: pretty-format-json
    args: [--autofix]
  - id: trailing-whitespace
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-toml
    args: [--autofix, --trailing-commas]
  - id: pretty-format-yaml
    args: [--autofix]
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 01a675ea018f2fb714478a5ffb83fcea8374bb06  # frozen: v0.15.21
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format
- repo: https://github.com/sqlfluff/sqlfluff
  rev: 1c2ec52808fdc09efa1552437ec9d140749f98d0  # frozen: 4.2.2
  hooks:
  - id: sqlfluff-fix
    args: [--dialect, sqlite]
- repo: https://github.com/mxr/mirrors-ty
  rev: 998abf4835043939a0ba4952b3da7026f45edf36  # frozen: v0.0.59
  hooks:
  - id: ty
    additional_dependencies:
    - aiosqlite
    - asyncio-for-ynab~=1.85.0
    - coverage
    - homeassistant-stubs
    - manager-for-ynab~=1.9.1
    - pytest
    - pytest-asyncio
    - pytest-homeassistant-custom-component
    - sqlite-export-for-ynab~=2.9.4
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 41e691678310dfd3833f7ab4e180ddb014310356  # frozen: v2.3.0
  hooks:
  - id: mypy
    additional_dependencies:
    - aiosqlite
    - asyncio-for-ynab~=1.85.0
    - coverage
    - homeassistant-stubs
    - manager-for-ynab~=1.9.1
    - pytest
    - pytest-asyncio
    - pytest-homeassistant-custom-component
    - sqlite-export-for-ynab~=2.9.4
- repo: https://github.com/mxr/sync-typing-deps
  rev: c2ec0c01a31703615c17e3fe11d1fe28c003f1d8  # frozen: v0.5.3
  hooks:
  - id: sync-typing-deps
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
  hooks:
  - id: zizmor
    args: [--no-progress, --fix]
- repo: https://github.com/rhysd/actionlint
  rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
  hooks:
  - id: actionlint
    additional_dependencies:
    - github.com/wasilibs/go-shellcheck/cmd/shellcheck@latest
